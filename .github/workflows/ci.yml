name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# Opt into Node.js 24 for JavaScript actions ahead of the June 2026 default
# switch (Node 20 is deprecated on GitHub runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Files need formatting:" && echo "$unformatted" && exit 1
          fi

      - name: go vet
        run: make vet

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - name: Tests (race detector)
        run: make test

      - name: Coverage
        run: make coverage

      - name: Build
        run: make build
