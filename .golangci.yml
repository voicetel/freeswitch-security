version: "2"
linters:
  default: all
  settings:
    cyclop:
      max-complexity: 15
    depguard:
      rules:
        Main:
          allow:
            - $gostd
            - github.com/voicetel/freeswitch-security
            - github.com/allegro/bigcache/v3
            - github.com/fiorix/go-eventsocket/eventsocket
            - github.com/gin-gonic/gin
    exhaustruct:
      include:
        - github.com/voicetel/freeswitch-security\.effective.*Config$
    funlen:
      lines: 120
      statements: 60
    gocognit:
      min-complexity: 30
    gocyclo:
      min-complexity: 15
    lll:
      line-length: 140
    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "10"
        - "20"
        - "30"
        - "50"
        - "60"
        - "100"
        - "200"
        - "400"
        - "500"
        - "504"
        - "1000"
        - "1024"
      ignored-functions:
        - time.*
        - strconv.*
        - make
        - context.WithTimeout
        - context.WithDeadline
        - http.StatusText
    nestif:
      min-complexity: 6
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
    tagliatelle:
      case:
        rules:
          json: camel
    varnamelen:
      min-name-length: 2
      ignore-names:
        - id
        - ip
        - ok
        - mu
        - wg
        - ev
        - bc
        - cs
        - ms
        - rp
        - rl
        - cr
        - cf
        - dn
        - nm
      ignore-decls:
        - tb testing.TB
        - t testing.T
        - b testing.B
        - c *gin.Context
        - i int
        - n int
        - w *EventWorker
        - sm *SecurityManager
        - em *ESLManager
        - rm *RateManager
        - cm *CacheManager
        - rp *RequestProcessor
        - pe *ProcessedEvent
        - rc *RateCounter
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - goprintffuncname
        path: logging\.go
      - linters:
          - gochecknoglobals
        text: (securityManager|cacheManager|eslManager|globalLogger|requestProcessor|httpServer|backoffMultipliers|config|secManagerOnce|cacheManagerOnce|eslManagerOnce|globalLoggerOnce|processorOnce|configOnce|sinkBool|sinkString|sinkStrings|sinkDuration) is a global variable
      - linters:
          - containedctx
        text: found a struct that contains a context\.Context field
      # config.go's AppConfig maps to the snake_case config.json file format
      # (operator directive); the HTTP API itself is camelCase (tagliatelle
      # json: camel), so only the config-file shape is exempt here.
      - linters:
          - tagliatelle
        path: config\.go$
      # ipset.go (and its tests) are ported verbatim from the sibling
      # opensips-journal-blocker project to keep the two firewall backends
      # behaviourally identical. They are intentionally linted under that
      # project's (looser) style ruleset rather than this repo's stricter one,
      # so the port stays byte-for-byte faithful. Logic linters (govet,
      # staticcheck, gosec, ineffassign, etc.) still apply.
      - linters:
          - err113
          - errorlint
          - funcorder
          - gochecknoglobals
          - goconst
          - lll
          - modernize
          - nlreturn
          - noctx
          - noinlineerr
          - paralleltest
          - perfsprint
          - varnamelen
          - wrapcheck
          - wsl
          - wsl_v5
        path: ipset(_test|_fake_test)?\.go$
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
