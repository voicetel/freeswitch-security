openapi: 3.0.3
info:
  title: freeswitch-security REST API
  version: 1.0.0
  description: |
    Control and monitoring API for **freeswitch-security**, the FreeSWITCH ESL →
    ipset IP blocker for the VoiceTel fleet.

    ## Role in the fleet
    This daemon enforces bans locally (kernel ipset behind one iptables match-set
    DROP rule) and participates in the central **chanDaemon** ban repository (D39):
    every enacted ban is reported to chanDaemon, and chanDaemon pushes
    customer/operator unbans back to `DELETE /api/v1/ips/{ip}/block`. See
    `chandaemon.md`.

    ## Authentication / access control
    There is no token. **State-changing** endpoints (`POST`/`PUT`/`PATCH`/`DELETE`)
    are restricted by a **source-IP allow-list**
    (`security.chandaemon.allowed_api_ips`, IPs and CIDRs) enforced in Go against
    the raw connection address (never `X-Forwarded-For`). It defaults to the
    chanDaemon nodes plus loopback, so the API is restricted by default; an empty
    list leaves it unrestricted. Read-only `GET` endpoints are always open; a
    non-allowed source receives `403`. For production, bind to localhost or front
    it with an authenticating reverse proxy.

    Request and response property names are `camelCase`, consistent with the
    rest of the fleet (chanDaemon, opensips-journal-blocker).
  license:
    name: MIT
    url: https://opensource.org/license/mit
  contact:
    name: VoiceTel Platform Engineering
    url: https://voicetel.com
servers:
  - url: http://{host}:{port}
    description: This blocker's API (config server.host/server.port; default 127.0.0.1:8088)
    variables:
      host:
        default: 127.0.0.1
        description: API bind address
      port:
        default: "8088"
        description: API port

tags:
  - name: Health & Monitoring
    description: Liveness, system, and security statistics.
  - name: chanDaemon
    description: The central ban-repository unban fan-out receiver.
  - name: Cache
    description: Response-cache statistics and control.
  - name: Whitelist
    description: Inspect and mutate the IP whitelist.
  - name: Blacklist
    description: Inspect and mutate the IP blacklist (bans).
  - name: Tracking
    description: Failed-registration and wrong-call-state tracking, and the firewall view.
  - name: ESL
    description: FreeSWITCH event-socket status and control.
  - name: Rate Limiting
    description: Call/registration rate-limit configuration and counters.
  - name: Untrusted Networks
    description: The untrusted-domain pattern list.

paths:
  /health:
    get:
      tags: [Health & Monitoring]
      summary: Health check
      description: Liveness probe; returns a status word once the server is serving.
      operationId: getHealth
      responses:
        "200":
          description: Service is serving.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
              example: { status: "ok", version: "v1.5.3" }

  /system/stats:
    get:
      tags: [Health & Monitoring]
      summary: Go runtime statistics
      description: Goroutine count, memory usage, and CPU info for the running process.
      operationId: getSystemStats
      responses:
        "200":
          description: Goroutine count, memory, and CPU info.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemStats" }
              example:
                version: "v1.5.3"
                goroutines: 38
                cpuCores: 8
                memory: { allocMb: 12, totalAllocMb: 540, sysMb: 30, gcRuns: 9, heapObjects: 80432 }

  /security/status:
    get:
      tags: [Health & Monitoring]
      summary: Security system overview
      description: Enabled flags, whitelist/blacklist counts, and the ESL connection state.
      operationId: getSecurityStatus
      responses:
        "200":
          description: Enabled flags, whitelist/blacklist counts, ESL connection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SecurityStatus" }
              example:
                enabled: true
                autoBlock: true
                whitelistCount: 234
                blacklistCount: 45
                eslConnected: true
                eslHost: "127.0.0.1"
                eslPort: "8021"

  /security/stats:
    get:
      tags: [Health & Monitoring]
      summary: Detailed security statistics
      description: |
        Counters for registrations, blocks, and (when chanDaemon reporting is
        enabled) `reportsSent` / `reportsFailed`.
      operationId: getSecurityStats
      responses:
        "200":
          description: Security counters.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SecurityStats" }
              example:
                totalRegistrations: 1548293
                failedRegistrations: 842
                blockedAttempts: 45
                wrongCallStates: 12
                activeWhitelistEntries: 234
                activeBlacklistEntries: 45
                reportsSent: 312
                reportsFailed: 0

  /cache/stats:
    get:
      tags: [Cache]
      summary: Cache statistics
      description: Response-cache hit/miss counters and effective TTL. When the cache is disabled only `enabled` is returned.
      operationId: getCacheStats
      responses:
        "200":
          description: Cache counters.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CacheStats" }
              example:
                enabled: true
                security: { hits: 800, misses: 47, entries: 1, ttl: "5m0s" }
                operations: { writes: 47, reads: 800, misses: 47, deletes: 0 }

  /cache/security/clear:
    post:
      tags: [Cache]
      summary: Clear the security response cache
      description: Drops the cached `/security/stats` response. State-changing, so gated by the source-IP allow-list.
      operationId: clearSecurityCache
      responses:
        "200":
          description: Cache cleared.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
              example: { status: "security cache cleared" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/ips/{ip}/block:
    delete:
      tags: [chanDaemon]
      summary: Lift a ban (chanDaemon unban fan-out)
      description: |
        Removes the IP from the blacklist and the kernel ipset. This is the
        receiver for chanDaemon's unban fan-out: chanDaemon sends an
        unauthenticated `DELETE` here when a customer/operator lifts a ban, so
        the only gate is the source-IP allow-list. The operation is idempotent —
        lifting an IP that is not banned still returns `200`.
      operationId: unblockIP
      parameters:
        - $ref: "#/components/parameters/IPPath"
      responses:
        "200":
          description: Ban lifted (or the IP was not banned).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnbanResponse" }
              example: { ip: "203.0.113.50", banned: false, message: "IP unblocked successfully" }
        "400":
          $ref: "#/components/responses/InvalidIP"
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/whitelist:
    get:
      tags: [Whitelist]
      summary: List whitelisted IPs
      description: Returns the active whitelist entries, keyed by IP address.
      operationId: listWhitelist
      responses:
        "200":
          description: Whitelisted IPs keyed by address.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WhitelistMap" }
              example:
                "203.0.113.7":
                  ip: "203.0.113.7"
                  userId: "2017301000"
                  domain: "x.example"
                  permanent: false
    post:
      tags: [Whitelist]
      summary: Add an IP to the whitelist
      description: Adds an IP to the whitelist; rejects a malformed IP with 400.
      operationId: addWhitelist
      requestBody:
        required: true
        description: The IP to whitelist and its optional user/domain/permanent flags.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WhitelistRequest" }
            example: { ip: "203.0.113.7", userId: "2017301000", domain: "x.example", permanent: false }
      responses:
        "200":
          description: IP whitelisted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusMessage" }
              example: { status: "success", message: "IP 203.0.113.7 added to whitelist for 2017301000@x.example" }
        "400":
          $ref: "#/components/responses/InvalidIP"
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/whitelist/batch:
    post:
      tags: [Whitelist]
      summary: Add many IPs to the whitelist
      description: Adds up to 1000 IPs in one request; each entry's outcome is reported independently.
      operationId: addWhitelistBatch
      requestBody:
        required: true
        description: The IPs to whitelist (max 1000).
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/WhitelistRequest" }
            example:
              - { ip: "203.0.113.7", userId: "2017301000" }
              - { ip: "203.0.113.8", userId: "2017301001" }
      responses:
        "200":
          description: Per-entry whitelist results.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BatchResults" }
              example: { results: [ { ip: "203.0.113.7", status: "success" }, { ip: "bad", error: "invalid IP address: bad" } ] }
        "400":
          description: Malformed request body, or more than 1000 entries.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "batch size exceeds limit of 1000" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/whitelist/{ip}:
    get:
      tags: [Whitelist]
      summary: Check whitelist status of an IP
      description: Reports whether the IP is whitelisted, with the associated user/domain when it is.
      operationId: getWhitelistEntry
      parameters:
        - $ref: "#/components/parameters/IPPath"
      responses:
        "200":
          description: Whitelist status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WhitelistCheck" }
              example: { ip: "203.0.113.7", whitelisted: true, userId: "2017301000", domain: "x.example" }
    delete:
      tags: [Whitelist]
      summary: Remove an IP from the whitelist
      description: Removes the given IP from the whitelist; a no-op if it is absent.
      operationId: removeWhitelist
      parameters:
        - $ref: "#/components/parameters/IPPath"
      responses:
        "200":
          description: IP removed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusMessage" }
              example: { status: "success", message: "IP 203.0.113.7 removed from whitelist" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/blacklist:
    get:
      tags: [Blacklist]
      summary: List blacklisted IPs
      description: Returns the active blacklist entries (bans), keyed by IP address.
      operationId: listBlacklist
      responses:
        "200":
          description: Blacklisted IPs keyed by address.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlacklistMap" }
              example:
                "203.0.113.50":
                  ip: "203.0.113.50"
                  reason: "Exceeded max failed registrations (5)"
                  permanent: false
    post:
      tags: [Blacklist]
      summary: Manually blacklist an IP
      description: |
        Bans the IP (added to the blacklist and the kernel ipset). When
        chanDaemon reporting is enabled the ban is also reported. Rejected if the
        IP is whitelisted or in a trusted network.
      operationId: addBlacklist
      requestBody:
        required: true
        description: The IP to ban, its reason, and an optional permanent flag.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BlacklistRequest" }
            example: { ip: "203.0.113.50", reason: "manual block", permanent: false }
      responses:
        "200":
          description: IP blacklisted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusMessage" }
              example: { status: "success", message: "IP 203.0.113.50 added to blacklist" }
        "400":
          description: Invalid IP, or the IP is whitelisted / in a trusted network.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "cannot blacklist whitelisted IP: 203.0.113.50" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/blacklist/batch:
    post:
      tags: [Blacklist]
      summary: Ban many IPs
      description: Bans up to 1000 IPs in one request; each entry's outcome is reported independently.
      operationId: addBlacklistBatch
      requestBody:
        required: true
        description: The IPs to ban (max 1000).
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/BlacklistRequest" }
            example:
              - { ip: "203.0.113.50", reason: "scanner" }
              - { ip: "203.0.113.51", reason: "scanner" }
      responses:
        "200":
          description: Per-entry blacklist results.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BatchResults" }
              example: { results: [ { ip: "203.0.113.50", status: "success" } ] }
        "400":
          description: Malformed body or a batch over the 1000-entry limit.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "batch size exceeds limit of 1000" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/blacklist/{ip}:
    get:
      tags: [Blacklist]
      summary: Check blacklist status of an IP
      description: Reports whether the IP is currently blacklisted.
      operationId: getBlacklistEntry
      parameters:
        - $ref: "#/components/parameters/IPPath"
      responses:
        "200":
          description: Blacklist status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlacklistCheck" }
              example: { ip: "203.0.113.50", blacklisted: true }
    delete:
      tags: [Blacklist]
      summary: Remove an IP from the blacklist
      description: Local unban. Note chanDaemon's fan-out uses `DELETE /api/v1/ips/{ip}/block` instead.
      operationId: removeBlacklist
      parameters:
        - $ref: "#/components/parameters/IPPath"
      responses:
        "200":
          description: IP removed and unblocked.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusMessage" }
              example: { status: "success", message: "IP 203.0.113.50 removed from blacklist" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/failed:
    get:
      tags: [Tracking]
      summary: List tracked failed-registration attempts
      description: Returns per-IP failed-registration tracking, keyed by IP address.
      operationId: getFailedAttempts
      responses:
        "200":
          description: Failed-attempt records keyed by IP.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FailedAttemptMap" }
              example:
                "203.0.113.50":
                  count: 4
                  firstAttempt: "2026-06-10T10:00:00Z"
                  lastAttempt: "2026-06-10T10:03:10Z"
                  userIds: ["2017301000"]
                  domains: ["x.example"]

  /security/wrong-call-states:
    get:
      tags: [Tracking]
      summary: List tracked wrong-call-state events
      description: Returns per-IP wrong-call-state tracking, keyed by IP address.
      operationId: getWrongCallStates
      responses:
        "200":
          description: Wrong-call-state records keyed by IP.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WrongStateMap" }
              example:
                "203.0.113.60":
                  count: 5
                  firstAttempt: "2026-06-10T09:50:00Z"
                  lastAttempt: "2026-06-10T09:58:01Z"
                  userIds: ["2017309999"]

  /security/iptables:
    get:
      tags: [Tracking]
      summary: Firewall (ipset) view
      description: The IPs currently in the kernel ipset and the chain holding the match-set DROP rule.
      operationId: getIPTablesInfo
      responses:
        "200":
          description: Firewall state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IPTablesInfo" }
              example: { chain: "INPUT", ipset: "freeswitch-security", blockedIps: ["203.0.113.50"], count: 1 }
        "500":
          $ref: "#/components/responses/ServerError"

  /security/esl:
    get:
      tags: [ESL]
      summary: ESL connection status and counters
      description: FreeSWITCH event-socket connection state, event counters, and worker/queue metrics.
      operationId: getESLStats
      responses:
        "200":
          description: ESL status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ESLStats" }
              example:
                connected: true
                host: "127.0.0.1"
                port: "8021"
                connectionAttempts: 1
                connectionErrors: 0
                eventsProcessed: 1548000
                eventsQueued: 1548000
                eventsDropped: 0
                logLevel: "info"
                workerCount: 4
                queueLength: 0
                queueCapacity: 4096

  /security/esl/log-level:
    post:
      tags: [ESL]
      summary: Set the ESL log level
      description: Sets the runtime log level (error, info, debug, trace).
      operationId: setESLLogLevel
      requestBody:
        required: true
        description: The log level to apply.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogLevelRequest" }
            example: { level: "debug" }
      responses:
        "200":
          description: Log level set.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusMessage" }
              example: { status: "success", message: "ESL log level set to debug" }
        "400":
          description: Missing the required `level` field.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Key: 'level' Error:Field validation for 'level' failed on the 'required' tag" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/esl/reconnect:
    post:
      tags: [ESL]
      summary: Force an ESL reconnection
      description: Initiates a reconnection to the FreeSWITCH event socket.
      operationId: reconnectESL
      responses:
        "200":
          description: Reconnection initiated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusMessage" }
              example: { status: "success", message: "ESL reconnection initiated" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/esl/command:
    post:
      tags: [ESL]
      summary: Run an allow-listed ESL command
      description: Executes an ESL command (subject to the configured command allow-list) with a 10s timeout.
      operationId: sendESLCommand
      requestBody:
        required: true
        description: The ESL command to run.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommandRequest" }
            example: { command: "status" }
      responses:
        "200":
          description: Command output.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommandResponse" }
              example: { command: "status", response: "UP 0 years, 0 days, 1 hour" }
        "400":
          description: Missing the required `command` field.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Key: 'command' Error:Field validation for 'command' failed on the 'required' tag" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          description: The command failed (e.g. not allow-listed, or ESL disconnected).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "command not allowed" }
        "504":
          description: The command timed out.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "command execution timeout" }

  /security/rate-limit:
    get:
      tags: [Rate Limiting]
      summary: Rate-limit configuration
      description: The effective call/registration rate-limit configuration in force.
      operationId: getRateLimitConfig
      responses:
        "200":
          description: Rate-limit configuration.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RateLimitConfig" }
              example:
                enabled: true
                callRateLimit: 20
                callRateInterval: "1m0s"
                registrationLimit: 10
                registrationWindow: "1m0s"
                autoBlockOnExceed: true
                blockDuration: "15m0s"
                whitelistBypass: true
                cleanupInterval: "5m0s"

  /security/rate-limit/calls:
    get:
      tags: [Rate Limiting]
      summary: Current per-IP call counters
      description: A snapshot of the per-IP call-rate counters, keyed by IP address.
      operationId: getCallRates
      responses:
        "200":
          description: Per-IP call counters.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RateCounterMap" }
              example:
                "203.0.113.5":
                  count: 12
                  firstRequest: "2026-06-10T10:00:00Z"
                  lastRequest: "2026-06-10T10:00:40Z"
                  userIds: ["2017301000"]
                  domains: ["x.example"]

  /security/rate-limit/registrations:
    get:
      tags: [Rate Limiting]
      summary: Current per-IP registration counters
      description: A snapshot of the per-IP registration-rate counters, keyed by IP address.
      operationId: getRegistrationRates
      responses:
        "200":
          description: Per-IP registration counters.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RateCounterMap" }
              example:
                "203.0.113.5":
                  count: 3
                  firstRequest: "2026-06-10T10:00:00Z"
                  lastRequest: "2026-06-10T10:00:30Z"
                  userIds: ["2017301000"]
                  domains: ["x.example"]

  /security/untrusted-networks:
    get:
      tags: [Untrusted Networks]
      summary: List untrusted-domain patterns
      description: Returns every exact-match domain pattern that triggers a ban on a failed registration.
      operationId: listUntrustedNetworks
      responses:
        "200":
          description: The untrusted-domain patterns.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PatternList" }
              example: ["evil.example", "scanner.example"]
    post:
      tags: [Untrusted Networks]
      summary: Add an untrusted-domain pattern
      description: Adds an exact-match domain pattern to the untrusted list.
      operationId: addUntrustedNetwork
      requestBody:
        required: true
        description: The pattern to add.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatternRequest" }
            example: { pattern: "evil.example" }
      responses:
        "200":
          description: Pattern added.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusMessage" }
              example: { status: "success", message: "Pattern 'evil.example' added to untrusted networks" }
        "400":
          description: Missing pattern, or the pattern already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "untrusted pattern already exists: \"evil.example\"" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/untrusted-networks/{pattern}:
    delete:
      tags: [Untrusted Networks]
      summary: Remove an untrusted-domain pattern
      description: Removes a pattern from the untrusted list.
      operationId: removeUntrustedNetwork
      parameters:
        - name: pattern
          in: path
          required: true
          description: The exact pattern to remove.
          schema: { type: string, example: "evil.example" }
      responses:
        "200":
          description: Pattern removed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusMessage" }
              example: { status: "success", message: "Pattern 'evil.example' removed from untrusted networks" }
        "400":
          description: The pattern was not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "untrusted pattern not found: \"evil.example\"" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /security/untrusted-networks/test/{domain}:
    get:
      tags: [Untrusted Networks]
      summary: Test a domain against the untrusted patterns
      description: Reports whether the given domain matches any untrusted pattern.
      operationId: testUntrustedDomain
      parameters:
        - name: domain
          in: path
          required: true
          description: The domain to test.
          schema: { type: string, example: "evil.example" }
      responses:
        "200":
          description: Match result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UntrustedTest" }
              example: { domain: "evil.example", isUntrusted: true }

components:
  parameters:
    IPPath:
      name: ip
      in: path
      required: true
      description: IPv4 address.
      schema: { type: string, format: ipv4, example: "203.0.113.50" }

  responses:
    InvalidIP:
      description: Malformed IP address.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example: { error: "invalid IP address: not-an-ip" }
    Forbidden:
      description: The source IP is not in the API allow-list.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example: { error: "source IP not permitted for this operation" }
    ServerError:
      description: An internal error (e.g. the firewall list could not be read).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example: { error: "failed to list ipset" }

  schemas:
    Health:
      type: object
      description: A single status word, with the build version on /health.
      properties:
        status: { type: string, example: "ok", description: "status word" }
        version: { type: string, example: "v1.5.3", description: "build version (/health only; \"dev\" for an un-stamped build)" }

    Error:
      type: object
      description: Plain error envelope returned on a non-2xx response.
      properties:
        error: { type: string, example: "source IP not permitted for this operation", description: "human-readable error detail" }

    StatusMessage:
      type: object
      description: Acknowledgement of a successful mutation.
      properties:
        status: { type: string, example: "success", description: "always \"success\" on a 200" }
        message: { type: string, example: "IP 203.0.113.50 added to blacklist", description: "human-readable confirmation" }

    UnbanResponse:
      type: object
      description: Result of lifting a ban via the chanDaemon unban endpoint.
      properties:
        ip: { type: string, example: "203.0.113.50", description: "the IP that was unblocked" }
        banned: { type: boolean, example: false, description: "always false on success" }
        message: { type: string, example: "IP unblocked successfully", description: "unblock confirmation" }

    SystemStats:
      type: object
      description: Go runtime statistics for the running process.
      properties:
        version: { type: string, example: "v1.5.3", description: "build version (\"dev\" for an un-stamped build)" }
        goroutines: { type: integer, example: 38, description: "live goroutines" }
        cpuCores: { type: integer, example: 8, description: "GOMAXPROCS / logical CPUs" }
        memory:
          type: object
          description: Heap and GC counters (MB unless noted).
          properties:
            allocMb: { type: integer, example: 12, description: "currently allocated heap (MB)" }
            totalAllocMb: { type: integer, example: 540, description: "cumulative allocated (MB)" }
            sysMb: { type: integer, example: 30, description: "memory obtained from the OS (MB)" }
            gcRuns: { type: integer, example: 9, description: "completed GC cycles" }
            heapObjects: { type: integer, example: 80432, description: "live heap objects" }

    SecurityStatus:
      type: object
      description: High-level security and ESL connection overview.
      properties:
        enabled: { type: boolean, example: true, description: "security subsystem enabled" }
        autoBlock: { type: boolean, example: true, description: "auto-block (firewall) enabled" }
        whitelistCount: { type: integer, example: 234, description: "active whitelist entries" }
        blacklistCount: { type: integer, example: 45, description: "active blacklist entries" }
        eslConnected: { type: boolean, example: true, description: "ESL connection up" }
        eslHost: { type: string, example: "127.0.0.1", description: "configured ESL host" }
        eslPort: { type: string, example: "8021", description: "configured ESL port" }

    CacheStats:
      type: object
      description: Response-cache counters; only `enabled` appears when the cache is off.
      properties:
        enabled: { type: boolean, example: true, description: "cache enabled" }
        security:
          type: object
          description: Cached-response counters and TTL.
          properties:
            hits: { type: integer, example: 800, description: "cache reads served" }
            misses: { type: integer, example: 47, description: "cache misses" }
            entries: { type: integer, example: 1, description: "live cached entries" }
            ttl: { type: string, example: "5m0s", description: "cached-response TTL" }
        operations:
          type: object
          description: Raw operation counters.
          properties:
            writes: { type: integer, example: 47, description: "cache writes" }
            reads: { type: integer, example: 800, description: "cache reads" }
            misses: { type: integer, example: 47, description: "cache misses (operations counter)" }
            deletes: { type: integer, example: 0, description: "cache deletes" }

    WhitelistRequest:
      type: object
      description: A request to add an IP to the whitelist.
      required: [ip]
      properties:
        ip: { type: string, format: ipv4, example: "203.0.113.7", description: "the IP to whitelist" }
        userId: { type: string, example: "2017301000", description: "associated SIP user (optional)" }
        domain: { type: string, example: "x.example", description: "associated domain (optional; defaults to freeswitch.default_domain)" }
        permanent: { type: boolean, example: false, description: "never expire this entry" }

    BlacklistRequest:
      type: object
      description: A request to manually ban an IP.
      required: [ip]
      properties:
        ip: { type: string, format: ipv4, example: "203.0.113.50", description: "the IP to ban" }
        reason: { type: string, example: "manual block", description: "free-text ban reason" }
        permanent: { type: boolean, example: false, description: "never expire this ban" }

    BatchResults:
      type: object
      description: Per-entry outcomes of a batch whitelist/blacklist operation.
      properties:
        results:
          type: array
          description: One result per submitted entry, in order.
          example: [ { ip: "203.0.113.7", status: "success" }, { ip: "bad", error: "invalid IP address: bad" } ]
          items: { $ref: "#/components/schemas/BatchResult" }

    BatchResult:
      type: object
      description: One entry's outcome; carries either `status` (success) or `error`.
      properties:
        ip: { type: string, example: "203.0.113.7", description: "the submitted IP" }
        status: { type: string, example: "success", description: "present on success" }
        error: { type: string, example: "invalid IP address: bad", description: "present on failure" }

    WhitelistCheck:
      type: object
      description: Whitelist status of one IP; user/domain present only when whitelisted.
      properties:
        ip: { type: string, example: "203.0.113.7", description: "the IP queried" }
        whitelisted: { type: boolean, example: true, description: "true if currently whitelisted" }
        userId: { type: string, example: "2017301000", description: "associated SIP user (present when whitelisted)" }
        domain: { type: string, example: "x.example", description: "associated domain (present when whitelisted)" }

    BlacklistCheck:
      type: object
      description: Blacklist status of one IP.
      properties:
        ip: { type: string, example: "203.0.113.50", description: "the IP whose ban status was queried" }
        blacklisted: { type: boolean, example: true, description: "true if currently blacklisted" }

    WhitelistEntry:
      type: object
      description: One whitelist entry.
      properties:
        ip: { type: string, example: "203.0.113.7", description: "the whitelisted IP" }
        userId: { type: string, example: "2017301000", description: "associated SIP user" }
        domain: { type: string, example: "x.example", description: "associated domain" }
        permanent: { type: boolean, example: false, description: "true if the entry never expires" }
        addedAt: { type: string, format: date-time, example: "2026-06-10T10:00:00Z", description: "when the entry was created" }
        expiresAt: { type: string, format: date-time, example: "2026-06-11T10:00:00Z", description: "when the entry expires (ignored if permanent)" }
        lastSeen: { type: string, format: date-time, example: "2026-06-10T10:05:50Z", description: "last activity that refreshed the entry" }

    BlacklistEntry:
      type: object
      description: One blacklist entry (an active ban).
      properties:
        ip: { type: string, example: "203.0.113.50", description: "the banned IP" }
        reason: { type: string, example: "Exceeded max failed registrations (5)", description: "why the IP was banned" }
        permanent: { type: boolean, example: false, description: "true if the ban never expires" }
        failCount: { type: integer, example: 5, description: "failed attempts recorded before the ban" }
        addedAt: { type: string, format: date-time, example: "2026-06-10T10:00:00Z", description: "when the ban was created" }
        expiresAt: { type: string, format: date-time, example: "2026-06-10T11:00:00Z", description: "when the ban expires (ignored if permanent)" }

    FailedAttempt:
      type: object
      description: Per-IP failed-registration tracking.
      properties:
        count: { type: integer, example: 4, description: "failed attempts in the window" }
        firstAttempt: { type: string, format: date-time, example: "2026-06-10T10:00:00Z", description: "first attempt time" }
        lastAttempt: { type: string, format: date-time, example: "2026-06-10T10:03:10Z", description: "most recent attempt time" }
        userIds: { type: array, items: { type: string }, example: ["2017301000"], description: "distinct SIP users seen" }
        domains: { type: array, items: { type: string }, example: ["x.example"], description: "distinct domains seen" }

    WrongCallStateEntry:
      type: object
      description: Per-IP wrong-call-state tracking.
      properties:
        count: { type: integer, example: 5, description: "wrong-call-state events in the window" }
        firstAttempt: { type: string, format: date-time, example: "2026-06-10T09:50:00Z", description: "first event time" }
        lastAttempt: { type: string, format: date-time, example: "2026-06-10T09:58:01Z", description: "most recent event time" }
        userIds: { type: array, items: { type: string }, example: ["2017309999"], description: "distinct SIP users in the wrong-state events" }

    RateCounter:
      type: object
      description: Per-IP rate counter for calls or registrations.
      properties:
        count: { type: integer, example: 12, description: "requests in the current window" }
        firstRequest: { type: string, format: date-time, example: "2026-06-10T10:00:00Z", description: "window start" }
        lastRequest: { type: string, format: date-time, example: "2026-06-10T10:00:40Z", description: "most recent request" }
        userIds: { type: array, items: { type: string }, example: ["2017301000"], description: "distinct SIP users in the rate window" }
        domains: { type: array, items: { type: string }, example: ["x.example"], description: "distinct domains in the rate window" }

    IPTablesInfo:
      type: object
      description: Firewall (ipset) state.
      properties:
        chain: { type: string, example: "INPUT", description: "chain holding the match-set DROP rule" }
        ipset: { type: string, example: "freeswitch-security", description: "name of the managed ipset" }
        blockedIps: { type: array, items: { type: string }, example: ["203.0.113.50"], description: "IPs currently in the set" }
        count: { type: integer, example: 1, description: "number of blocked IPs" }

    ESLStats:
      type: object
      description: FreeSWITCH event-socket status and counters.
      properties:
        connected: { type: boolean, example: true, description: "connection up" }
        host: { type: string, example: "127.0.0.1", description: "ESL host" }
        port: { type: string, example: "8021", description: "ESL port" }
        connectionAttempts: { type: integer, example: 1, description: "connection attempts" }
        connectionErrors: { type: integer, example: 0, description: "connection errors" }
        eventsProcessed: { type: integer, example: 1548000, description: "events processed" }
        eventsQueued: { type: integer, example: 1548000, description: "events enqueued" }
        eventsDropped: { type: integer, example: 0, description: "events dropped (queue full)" }
        logLevel: { type: string, example: "info", description: "current ESL log level" }
        workerCount: { type: integer, example: 4, description: "event worker goroutines" }
        queueLength: { type: integer, example: 0, description: "queued events now" }
        queueCapacity: { type: integer, example: 4096, description: "total queue capacity" }

    LogLevelRequest:
      type: object
      description: A request to set the ESL log level.
      required: [level]
      properties:
        level: { type: string, enum: [error, info, debug, trace], example: "debug", description: "log level to apply" }

    CommandRequest:
      type: object
      description: An ESL command to run.
      required: [command]
      properties:
        command: { type: string, example: "status", description: "the ESL command" }

    CommandResponse:
      type: object
      description: The result of an ESL command.
      properties:
        command: { type: string, example: "status", description: "the command that was run" }
        response: { type: string, example: "UP 0 years, 0 days, 1 hour", description: "raw ESL output" }

    RateLimitConfig:
      type: object
      description: Effective rate-limit configuration.
      properties:
        enabled: { type: boolean, example: true, description: "rate limiting enabled" }
        callRateLimit: { type: integer, example: 20, description: "calls allowed per interval" }
        callRateInterval: { type: string, example: "1m0s", description: "call-rate window" }
        registrationLimit: { type: integer, example: 10, description: "registrations allowed per window" }
        registrationWindow: { type: string, example: "1m0s", description: "registration window" }
        autoBlockOnExceed: { type: boolean, example: true, description: "auto-ban on limit breach" }
        blockDuration: { type: string, example: "15m0s", description: "ban length on breach" }
        whitelistBypass: { type: boolean, example: true, description: "whitelisted IPs bypass limits" }
        cleanupInterval: { type: string, example: "5m0s", description: "counter cleanup interval" }

    PatternRequest:
      type: object
      description: An untrusted-domain pattern to add.
      required: [pattern]
      properties:
        pattern: { type: string, example: "evil.example", description: "exact-match domain pattern" }

    UntrustedTest:
      type: object
      description: Result of testing a domain against the untrusted patterns.
      properties:
        domain: { type: string, example: "evil.example", description: "the domain tested" }
        isUntrusted: { type: boolean, example: true, description: "true if it matches a pattern" }

    PatternList:
      type: array
      description: Untrusted-domain patterns.
      items: { type: string, example: "evil.example" }

    WhitelistMap:
      type: object
      description: Active whitelist entries keyed by IP address.
      additionalProperties:
        $ref: "#/components/schemas/WhitelistEntry"

    BlacklistMap:
      type: object
      description: Active blacklist entries keyed by IP address.
      additionalProperties:
        $ref: "#/components/schemas/BlacklistEntry"

    FailedAttemptMap:
      type: object
      description: Failed-attempt records keyed by IP address.
      additionalProperties:
        $ref: "#/components/schemas/FailedAttempt"

    WrongStateMap:
      type: object
      description: Wrong-call-state records keyed by IP address.
      additionalProperties:
        $ref: "#/components/schemas/WrongCallStateEntry"

    RateCounterMap:
      type: object
      description: Per-IP rate counters keyed by IP address.
      additionalProperties:
        $ref: "#/components/schemas/RateCounter"

    SecurityStats:
      type: object
      description: Security counters; report counters appear when chanDaemon reporting is enabled.
      properties:
        totalRegistrations: { type: integer, example: 1548293, description: "successful registrations seen" }
        failedRegistrations: { type: integer, example: 842, description: "failed registration attempts" }
        blockedAttempts: { type: integer, example: 45, description: "blacklist additions processed" }
        wrongCallStates: { type: integer, example: 12, description: "wrong-call-state events" }
        lastRegistrationTime: { type: string, format: date-time, example: "2026-06-10T10:05:50Z", description: "time of the last successful registration (zero value when none)" }
        lastFailedTime: { type: string, format: date-time, example: "2026-06-10T10:04:10Z", description: "time of the last failed-registration batch (zero value when none)" }
        lastWrongCallStateTime: { type: string, format: date-time, example: "2026-06-10T09:58:01Z", description: "time of the last wrong-call-state batch (zero value when none)" }
        activeWhitelistEntries: { type: integer, example: 234, description: "current whitelist size" }
        activeBlacklistEntries: { type: integer, example: 45, description: "current blacklist size" }
        reportsSent: { type: integer, example: 312, description: "chanDaemon reports accepted (reporting enabled only)" }
        reportsFailed: { type: integer, example: 0, description: "chanDaemon reports failed (reporting enabled only)" }
